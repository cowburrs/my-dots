# See https://wiki.hyprland.org/Configuring/Keywords/
#################
### Variables ###
#################
$mainMod = SUPER # Sets "Windows" key as main modifier
$appBind = SUPER SHIFT
$moveToWorkspace = SUPER SHIFT
###################
### MY PROGRAMS ###
###################

# See https://wiki.hyprland.org/Configuring/Keywords/

# Set programs that you use
$terminal = kitty
$fileManager = dolphin
$menu = wofi --show drun

##################
### CONF FILES ###
##################

source = ~/.config/hypr/modules/input.conf
source = ~/.config/hypr/modules/binds.conf
source = ~/.config/hypr/modules/general.conf
source = ~/.config/hypr/modules/monitors.conf
source = ~/.config/hypr/modules/winrules.conf
source = ~/.config/hypr/modules/env.conf
source = ~/.config/hypr/modules/permissions.conf
source = ~/.config/hypr/modules/startup.conf
